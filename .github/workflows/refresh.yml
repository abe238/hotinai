name: Refresh

# Server-side mirror of the local snapshot cron: refresh the board, bake the
# site, commit the data, deploy Pages, and purge Cloudflare — so hotin.ai stays
# fresh even when the Mac is asleep. A GITHUB_TOKEN push does NOT trigger other
# workflows, so this job deploys Pages itself instead of relying on pages.yml.
#
# GitHub cron is UTC (no DST): 12:00 UTC = 5am PDT is one of the fire times, so
# in summer this runs at 5/8/11am, 2/5/8/11pm and 2am PT. In winter (PST) each
# time shifts one hour earlier.

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours; includes 12:00 UTC (5am PDT)
  workflow_dispatch:

permissions:
  contents: write   # commit the snapshot
  pages: write      # deploy to Pages
  id-token: write   # OIDC for deploy-pages

concurrency:
  group: hotin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so a rebase-retry can succeed
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Restore observation store (time series for velocity badges)
        uses: actions/cache@v4
        with:
          path: ~/.local/share/hotin
          key: hotin-store-${{ github.run_id }}
          restore-keys: hotin-store-
      - name: Refresh sources + bake the board
        env:
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          hotin refresh || echo "refresh reported issues (non-fatal)"
          hotin export --limit 60
      - name: Commit the snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data/latest.json
          if git diff --cached --quiet; then
            echo "no board changes"
          else
            git commit -m "snapshot: CI board refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              git push && break
              echo "push rejected; rebasing (attempt $i)"
              git pull --rebase -X theirs origin main || true
            done
          fi
      - name: Upload the baked site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
      - name: Purge Cloudflare (bare / is cached separately from /index.html)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "no CLOUDFLARE_API_TOKEN secret set; skipping purge (site still deploys, bare / clears on Cloudflare TTL)"
            exit 0
          fi
          ZID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones?name=hotin.ai" | python3 -c "import sys,json;print((json.load(sys.stdin).get('result') or [{}])[0].get('id',''))")
          curl -s -X POST -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZID/purge_cache" \
            -d '{"files":["https://hotin.ai/","https://hotin.ai/index.html"]}'
          echo "purged Cloudflare"
